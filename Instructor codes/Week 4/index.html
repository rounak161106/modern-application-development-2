<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue Component App</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <style>
        .comp-style{
            color: red;
            background-color: rgb(185, 218, 185);
            border: 2px solid black;
            font-size: 14px;
        }  
    
    </style>
</head>
<body>
    <div>This is the heading of my app</div>

    <div id="app">
        {{ message }}

        <h4>All Likes: {{ allLikes }}</h4>
        <blog v-on:liked="addLike"></blog>
        <!-- 1 root element -->
        <blog 
            v-bind:attr1="compMessage" 
            attr2="Value 2" 
            class="comp-style"
            v-on:liked="addLike"
            >This is external content</blog>
        
        <blog 
            attr1="Value 3" 
            :attr2="compMessage" 
            class="comp-style"
            v-on:liked="addLike"
        >This is external content</blog>
    </div>
    <script src="./script.js"></script>
</body>
</html>
