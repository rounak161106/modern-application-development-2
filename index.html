<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello World</h1>
    <script>
        class Animal {

            constructor(name) {
                this.name = name;
            }

            speak() {
                console.log(this.name + " makes sound");
            }
        }

        class Dog extends Animal {

        }

        let d = new Dog("Tommy");
        d.speak();
    </script>
</body>
