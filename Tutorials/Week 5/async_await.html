<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello world</h1>
    <script>
        async function test() {
            return "Async function in the test function";
        }
        console.log("Before calling async function");
        console.log(test().then((result) => console.log(result)));
        console.log("After calling async function");
    </script>
</body>
</html>
